<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Node.js App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; color: #38bdf8; }
    p { color: #94a3b8; margin-bottom: 24px; }
    button {
      background: #0ea5e9;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin: 6px;
      transition: background 0.2s;
    }
    button:hover { background: #0284c7; }
    #output {
      margin-top: 24px;
      background: #0f172a;
      border-radius: 8px;
      padding: 16px;
      font-family: monospace;
      font-size: 0.9rem;
      color: #4ade80;
      min-height: 60px;
      text-align: left;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello World</h1>
    <p>Node.js app running on EC2 Amazon Linux 2023</p>
    <button onclick="callApi('/api/hello')">Say Hello</button>
    <button onclick="callApi('/api/health')">Health Check</button>
    <div id="output">Click a button to call the API...</div>
  </div>

  <script>
    async function callApi(endpoint) {
      const out = document.getElementById('output');
      out.textContent = 'Loading...';
      try {
        const res = await fetch(endpoint);
        const data = await res.json();
        out.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        out.textContent = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
